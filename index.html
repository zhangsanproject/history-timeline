<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五代十国风云纪事</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>五代十国风云纪事</h1>
        <p>向下滚动，沉浸式探索历史脉络</p>
    </header>

    <div class="timeline">
        <!-- 第一个节点 -->
        <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
                <h3>公元 947 年：张彦泽纵兵大掠</h3>
                <p>契丹军入开封，张彦泽自恃有功，骄横跋扈，纵容部下在城中烧杀抢掠，最终被耶律德光处死。</p>
            </div>
        </div>

        <!-- 第二个节点 -->
        <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
                <h3>公元 950 年：郭威家属惨案</h3>
                <p>后汉隐帝刘承祐对权臣心生猜忌，下令诛杀郭威在京城的家属。这一惨剧成为逼迫郭威最终起兵反汉的直接导火索。</p>
            </div>
        </div>

        <!-- 第三个节点 -->
        <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
                <h3>公元 951 年：代汉建周</h3>
                <p>郭威正式称帝，国号大周，史称后周，定都汴州。五代时期最后一个，也是最具开创性的中原王朝建立。</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
